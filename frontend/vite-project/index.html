<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mess Mate - Smart Meal Booking</title>
    
    <!-- CRITICAL: Immediate inline styles to prevent white flash -->
    <style>
      /* This loads BEFORE any React code */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body, #root {
        width: 100%;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        position: relative;
      }
      
      /* Loading indicator while React loads */
      .app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      
      .app-loading.hide {
        opacity: 0;
        pointer-events: none;
      }
      
      .loader {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loading-text {
        color: white;
        margin-top: 20px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 18px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading indicator while React loads -->
      <div id="app-loading" class="app-loading">
        <div style="text-align: center;">
          <div class="loader"></div>
          <div class="loading-text">🍽️ Loading Mess Mate...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Hide loading indicator when React mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingEl = document.getElementById('app-loading');
          if (loadingEl) {
            loadingEl.classList.add('hide');
            setTimeout(() => {
              if (loadingEl.parentNode) {
                loadingEl.style.display = 'none';
              }
            }, 300);
          }
        }, 100);
      });
    </script>
  </body>
</html>
