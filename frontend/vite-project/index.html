<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MessMate — Smart meal booking for your hostel mess" />
    <title>MessMate — Smart Meal Booking</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; min-height: 100vh; }
      body { background: #F9FAFB; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

      /* Initial loading screen shown before React boots */
      #app-loading {
        position: fixed; inset: 0;
        background: #F9FAFB;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 16px; z-index: 9999;
        transition: opacity 0.25s ease;
      }
      #app-loading.hide { opacity: 0; pointer-events: none; }
      .boot-logo { font-size: 40px; }
      .boot-title {
        font-size: 20px; font-weight: 700;
        background: linear-gradient(135deg, #F97316, #EA6C0A);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        letter-spacing: -0.5px;
      }
      .boot-spinner {
        width: 32px; height: 32px;
        border: 3px solid #E5E7EB;
        border-top-color: #F97316;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loading">
        <div class="boot-logo">🍽️</div>
        <div class="boot-title">MessMate</div>
        <div class="boot-spinner"></div>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const el = document.getElementById('app-loading');
          if (el) {
            el.classList.add('hide');
            setTimeout(() => el.remove(), 300);
          }
        }, 150);
      });
    </script>
  </body>
</html>
